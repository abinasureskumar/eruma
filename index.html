<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>eruma</title>
    <link rel="icon" type="image/x-icon" href="/img/buchstabe-a.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Envelope Screen -->
    <div id="envelope-container">
        <img src="img/envelope.png" id="envelope" />
        <p>Letter for uuu</p>
    </div>

    <!-- Letter Screen -->
    <div id="letter-container">
        <div class="letter-window">
            <h1 id="letter-title">Do u love me or not?</h1>
            <img src="img/kuromi-angry.gif" class="cat" id="letter-cat">
            <div class="buttons" id="letter-buttons">
                <img src="img/yes.png" alt="Yes" class="btn yes-btn">

                <div class="no-wrapper">
                    <img src="img/no.png" class="btn no-btn">
                </div>
            </div>

            <p id="final-text" class="final-text" style="display: none;">
                <strong>he he he he he</strong>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
